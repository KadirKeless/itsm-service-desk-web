spring.application.name=itsm-final

# === Database (desktop ile ayni DB) ===
spring.datasource.url=jdbc:mysql://localhost:3306/ITSM_DB?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Europe/Istanbul&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
# Sema DB'de manuel olarak (ITSM_DB SQL scripti) olusturuldu.
# 'validate' = Hibernate hicbir DDL calistirmaz; sadece entity-tablo uyumunu kontrol eder.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# === Thymeleaf (development) ===
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# === Server ===
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# === Profil resimleri (web projesine ozel klasor) ===
itsm.avatar-dir=assets-avatars
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# === Logging ===
logging.level.org.springframework.security=INFO
